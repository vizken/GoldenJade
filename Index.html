<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>й«ҳзҺүдјҒжҘӯ вҖ” жҘӯеӢҷе ұеғ№зі»зөұе…ҘеҸЈ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#F4F6FA;color:#1a1a2e;height:100vh;overflow:hidden}
.login{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#013121,#2A5240)}
.panel{width:min(420px,100%);background:#fff;border-radius:8px;padding:26px 28px;box-shadow:0 18px 50px rgba(0,0,0,.28)}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.mark{width:54px;height:54px;border-radius:8px;background:#013121;color:#C9A84C;display:grid;place-items:center;font-weight:800;font-size:22px}
h1{font-size:22px;color:#013121;line-height:1.2}
.sub{font-size:12px;color:#666;margin-top:4px}
label{display:block;font-size:12px;font-weight:700;color:#013121;margin:14px 0 5px}
select,input{width:100%;height:42px;border:1.5px solid #cbd5e1;border-radius:6px;padding:0 11px;font-size:15px;background:#fff}
input:focus,select:focus{outline:2px solid rgba(1,49,33,.2);border-color:#013121}
.btn{width:100%;height:44px;margin-top:18px;border:0;border-radius:6px;background:#013121;color:#fff;font-size:15px;font-weight:800;cursor:pointer}
.btn:hover{background:#2A5240}
.err{display:none;margin-top:12px;padding:9px 11px;border-radius:6px;background:#FFF1F1;color:#B42318;font-size:12px}
.hint{margin-top:14px;font-size:11px;color:#777;line-height:1.7}
.app{display:none;height:100vh;grid-template-rows:44px 1fr}
.top{display:flex;align-items:center;gap:12px;padding:0 14px;background:#013121;color:#fff}
.top strong{font-size:14px}
.role{font-size:12px;color:rgba(255,255,255,.78)}
.spacer{flex:1}
.logout{border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;border-radius:5px;padding:5px 10px;font-size:12px;cursor:pointer}
iframe{width:100%;height:100%;border:0;background:#fff}
</style>
</head>
<body>
<main class="login" id="login">
  <section class="panel">
    <div class="brand">
      <div class="mark">GJ</div>
      <div>
        <h1>й«ҳзҺүдјҒжҘӯ</h1>
        <div class="sub">жҘӯеӢҷе ұеғ№зі»зөұж¬Ҡйҷҗе…ҘеҸЈ</div>
      </div>
    </div>

    <label for="account">дҪҝз”ЁиҖ…</label>
    <select id="account">
      <option value="tina_huang">Tina Huang</option>
      <option value="tina_kao">Tina Kao</option>
      <option value="noah_tseng">Noah Tseng</option>
    </select>

    <label for="pin">PIN</label>
    <input id="pin" type="password" inputmode="text" autocomplete="current-password" placeholder="ијёе…Ҙ PIN">

    <button class="btn" onclick="login()">зҷ»е…Ҙ</button>
    <div class="err" id="err">дҪҝз”ЁиҖ…жҲ– PIN дёҚжӯЈзўәгҖӮ</div>
    <div class="hint">Tina Huang / Tina Kao еҸҜдҪҝз”Ёе…ЁйғЁз”ўе“ҒпјӣNoah Tseng еғ…еҸҜдҪҝз”ЁеҶ·еҮҚйЈҹе“ҒиҲҮйқһйЈҹе“ҒпјҲз”Ёе“ҒпјүгҖӮ</div>
  </section>
</main>

<section class="app" id="app">
  <div class="top">
    <strong>Golden Jade Terre й«ҳзҺүдјҒжҘӯ</strong>
    <span class="role" id="roleText"></span>
    <div class="spacer"></div>
    <button class="logout" onclick="logout()">зҷ»еҮә</button>
  </div>
  <iframe id="systemFrame" title="й«ҳзҺүжҘӯеӢҷе ұеғ№зі»зөұ"></iframe>
</section>

<script>
const ACCOUNTS={
  tina_huang:{name:'Tina Huang',pin:'tina2026',file:'й«ҳзҺүжҘӯеӢҷе ұеғ№зі»зөұ.html',scope:'е…ЁйғЁз”ўе“Ғ'},
  tina_kao:{name:'Tina Kao',pin:'kao2026',file:'й«ҳзҺүжҘӯеӢҷе ұеғ№зі»зөұ.html',scope:'е…ЁйғЁз”ўе“Ғ'},
  noah_tseng:{name:'Noah Tseng',pin:'noah2026',file:'й«ҳзҺүжҘӯеӢҷе ұеғ№зі»зөұ_NoahTseng.html',scope:'еҶ·еҮҚйЈҹе“ҒиҲҮйқһйЈҹе“ҒпјҲз”Ёе“Ғпјү'}
};

function openSystem(accountKey){
  const account=ACCOUNTS[accountKey];
  if(!account)return;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='grid';
  document.getElementById('roleText').textContent=account.name+' пҪң '+account.scope;
  document.getElementById('systemFrame').src=account.file;
  sessionStorage.setItem('goldenJadeUser',accountKey);
}

function login(){
  const key=document.getElementById('account').value;
  const pin=document.getElementById('pin').value;
  const account=ACCOUNTS[key];
  if(!account||account.pin!==pin){
    document.getElementById('err').style.display='block';
    return;
  }
  document.getElementById('err').style.display='none';
  openSystem(key);
}

function logout(){
  sessionStorage.removeItem('goldenJadeUser');
  document.getElementById('systemFrame').src='about:blank';
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='grid';
  document.getElementById('pin').value='';
}

document.getElementById('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
const saved=sessionStorage.getItem('goldenJadeUser');
if(saved&&ACCOUNTS[saved])openSystem(saved);
</script>
</body>
</html>
