<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>高玉企業 — 業務報價系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:12px;background:#F4F6FA;color:#1a1a2e;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:linear-gradient(135deg,#013121,#2A5240);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-logo{font-size:17px;font-weight:700}.hdr-sub{font-size:10px;opacity:.7;margin-top:1px}
.hdr-badge{margin-left:auto;background:rgba(255,255,255,.15);border-radius:6px;padding:4px 12px;text-align:center;font-size:11px}
.hdr-badge strong{display:block;font-size:15px;font-weight:700}
.lockbar{background:#FFF9E6;border-bottom:1px solid #F0D060;color:#7A5000;padding:5px 18px;font-size:11px;text-align:center;flex-shrink:0}
.main{display:flex;flex:1;overflow:hidden}
/* LEFT */
.left{display:flex;flex-direction:column;width:60%;border-right:1px solid #dde2ec;background:#fff;overflow:hidden}
.col-toggles{padding:7px 12px;background:#F0F4FA;border-bottom:1px solid #e2e8f0;display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.tgl-lbl{font-size:10px;font-weight:700;color:#4a5568;margin-right:4px;white-space:nowrap}
.tgl{display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:#4a5568;padding:2px 8px;border-radius:4px;border:1px solid #ccd4e0;background:#fff;user-select:none}
.tgl:hover{background:#EEF1F8}.tgl.on{background:#E8EEFF;border-color:#013121;color:#013121;font-weight:700}
.tgl input{width:13px;height:13px;cursor:pointer;accent-color:#013121}
.filters{padding:8px 12px;border-bottom:1px solid #eee;display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end;background:#F8F9FC;flex-shrink:0}
.filters label{font-size:10px;color:#666;display:block;margin-bottom:2px}
.filters input,.filters select{padding:4px 8px;border:1px solid #ccd4e0;border-radius:5px;font-size:11px;background:#fff;color:#222}
.filters input{width:135px}
.f-cnt{font-size:10px;color:#888;align-self:center;margin-left:auto}
.prod-wrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{position:sticky;top:0;background:#EEF1F8;font-size:10px;font-weight:600;color:#4a5568;padding:5px 8px;text-align:left;border-bottom:2px solid #dde2ec;white-space:nowrap;z-index:2}
td{padding:5px 8px;border-bottom:1px solid #f0f2f7;vertical-align:middle}
tr.row:hover td{background:#EDF2FF;cursor:pointer}
tr.row.sel td{background:#D6E8FF!important}
.b{display:inline-block;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:600}
.bf{background:#E6F1FB;color:#1a56db}.bn{background:#f0f0f0;color:#555}
.bpx{background:#EDE7F6;color:#5E35B1}.bml{background:#FFF0E6;color:#CC4400}
.mp{color:#1a56db;font-weight:600}.mp-na{color:#bbb;font-size:10px}
/* RIGHT */
.right{display:flex;flex-direction:column;width:40%;background:#F8F9FC;overflow:hidden}
.qt-hdr{padding:10px 14px;border-bottom:1px solid #dde2ec;background:#fff;flex-shrink:0}
.qt-hdr h3{font-size:13px;font-weight:700;color:#013121;margin-bottom:8px}
/* 客戶區 */
.cust-bar{background:#EEF4FF;border-radius:7px;padding:8px 10px;margin-bottom:8px}
.cust-row{display:flex;align-items:center;gap:8px}
.cust-row label{font-size:11px;font-weight:700;color:#013121;white-space:nowrap}
.cust-row select{flex:1;padding:5px 8px;border:1.5px solid #013121;border-radius:5px;font-size:12px;background:#fff;color:#1a1a2e;font-weight:600}
/* 其他客戶輸入區 */
.other-fields{margin-top:8px;padding-top:8px;border-top:1px dashed #b8ccee;display:none;gap:8px;flex-direction:column}
.other-fields.show{display:flex}
.other-fields .row{display:flex;gap:8px;align-items:center}
.other-fields label{font-size:10px;color:#013121;font-weight:700;white-space:nowrap;width:72px}
.other-fields input{flex:1;padding:5px 8px;border:1.5px solid #013121;border-radius:5px;font-size:12px;background:#fff}
.other-fields input:focus{outline:2px solid #013121;outline-offset:1px}
.other-fields .hint{font-size:10px;color:#888;margin-top:2px}
/* 美廉社雙選 */
.pay-choice{background:#fff;border:1.5px solid #013121;border-radius:8px;padding:8px 10px;margin-bottom:8px;display:none}
.pay-choice label{font-size:11px;font-weight:600;color:#013121;display:block;margin-bottom:6px}
.pay-choice .opts{display:flex;gap:8px}
.pay-choice .opt{padding:5px 16px;border:1.5px solid #ccd4e0;border-radius:99px;cursor:pointer;font-size:12px;font-weight:600;background:#fff;transition:all .15s}
.pay-choice .opt:hover{border-color:#013121;background:#EEF4FF}
.pay-choice .opt.active{border-color:#013121;background:#013121;color:#fff}
/* Meta */
.qt-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qt-meta .f label{font-size:10px;color:#666;display:block;margin-bottom:2px}
.qt-meta .f input,.qt-meta .f select{width:100%;padding:4px 8px;border:1px solid #ccd4e0;border-radius:5px;font-size:11px;background:#fff}
.span2{grid-column:1/-1}
/* Body */
.qt-body{flex:1;overflow-y:auto;padding:8px 12px}
.qt-bh{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.qi{background:#fff;border:1px solid #dde2ec;border-radius:8px;padding:9px 11px;margin-bottom:7px;position:relative;animation:fi .15s ease}
.qi.err{border-color:#FC8181;background:#FFF5F5}
.qi-rm{position:absolute;top:7px;right:9px;background:none;border:none;color:#ccc;cursor:pointer;font-size:15px;line-height:1;padding:2px 4px}
.qi-rm:hover{color:#E53E3E}
.qi-name{font-weight:700;font-size:12px;margin-bottom:2px;padding-right:20px}
.qi-meta{font-size:10px;color:#888;margin-bottom:7px;line-height:1.8}
.tag{display:inline-block;background:#EEF1F8;border-radius:3px;padding:0 5px;margin-right:3px;color:#555;font-weight:600}
.tag.pay-tag{background:#E8EEFF;color:#013121;font-weight:700}
.qi-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px}
.qi-row label{font-size:10px;color:#666;white-space:nowrap}
.qi-row input{padding:4px 7px;border:1px solid #ccd4e0;border-radius:5px;font-size:12px;text-align:right}
.qi-row select{padding:4px 7px;border:1px solid #ccd4e0;border-radius:5px;font-size:11px;background:#fff}
.iw{width:75px}.iwp{width:100px}
.err-inp{border-color:#FC8181!important;background:#FFF5F5!important}
.qi-cur{font-size:11px;color:#888}
.qi-floor{font-size:10px;color:#718096;margin-left:auto;white-space:nowrap}
.qi-err{font-size:10px;color:#E53E3E;margin-top:3px}
/* Footer */
.qt-foot{padding:10px 14px;border-top:1px solid #dde2ec;background:#fff;flex-shrink:0}
.btn-row{display:flex;gap:8px}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-p{background:#013121;color:#fff;flex:1}.btn-p:hover{background:#2A5240}.btn-p:disabled{background:#a0aec0;cursor:not-allowed}
.btn-o{background:#fff;color:#013121;border:1.5px solid #013121}.btn-o:hover{background:#EEF4FF}
.empty{text-align:center;padding:36px 20px;color:#bbb;font-size:12px}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
@media print{.left,.hdr,.lockbar{display:none!important}.right{width:100%!important;background:#fff!important;height:auto!important}.btn-row,.qi-rm,.cust-bar,.pay-choice{display:none!important}}
</style>
</head>

// ── 客戶選擇 ──
// ── TWD / 外幣模式切換 ──
function updateCurMode(){
  const bar=document.getElementById('curModeBar');
  if(isTWD){
    bar.style.display='block';
    document.getElementById('qcur').value='TWD';
    document.getElementById('qcur').disabled=true;
  } else {
    bar.style.display='none';
    document.getElementById('qcur').disabled=false;
  }
  // 切換客戶時，自動重設購物車各品項報價為對應底限
  Object.keys(cart).forEach(idx=>{
    const r=D[idx];
    if(isTWD){
      // TWD模式：有台幣底限用台幣底限，否則清空讓業務自行填
      cart[idx].price = r[20]>0 ? r[20] : 0;
    } else {
      // 外幣模式：用外幣底限
      cart[idx].price = r[15]>0 ? r[15] : 0;
    }
  });
  if(Object.keys(cart).length) renCart();
}

function selCust(val){
  const pc=document.getElementById('payChoice');
  const of=document.getElementById('otherFields');

  if(val==='__other__'){
    // 其他：顯示手動輸入欄，隱藏其他
    of.className='other-fields show';
    pc.style.display='none';
    isTWD=false;
    updateCurMode();
    document.getElementById('cl').value='';
    document.getElementById('qpay').value='';
    document.getElementById('otherName').value='';
    document.getElementById('otherPay').value='';
    document.getElementById('otherName').focus();
    return;
  }

  // 隱藏其他輸入欄
  of.className='other-fields';

  const cust=CUSTS.find(c=>c.name===val);
  // 設定 TWD 模式
  isTWD = !!(cust&&cust.twd);
  updateCurMode();

  if(cust){
    document.getElementById('cl').value=cust.name;
    const pay=cust.opts[0];
    document.getElementById('qpay').value=pay;
    if(cust.opts.length>1){
      pc.style.display='block';
      pc.querySelectorAll('.opt').forEach((o,i)=>{
        o.className='opt'+(i===0?' active':'');
        o.textContent=cust.opts[i];
        o.onclick=function(){pickPay(cust.opts[i],this);};
      });
    } else {
      pc.style.display='none';
    }
    applyDefaultPay(pay);
  } else {
    // 空選項
    pc.style.display='none';
    document.getElementById('cl').value='';
  }
}

// 其他客戶：同步名稱
function syncOtherName(){
  const v=document.getElementById('otherName').value;
  document.getElementById('cl').value=v;
}

// 其他客戶：同步付款條件
function syncOtherPay(){
  const v=document.getElementById('otherPay').value;
  document.getElementById('qpay').value=v;
  applyDefaultPay(v);
}

function applyDefaultPay(pay){
  // 同步所有已在購物車的品項
  Object.keys(cart).map(Number).forEach(idx=>{cart[idx].pay=pay;});
  if(Object.keys(cart).length)renCart();
}

function pickPay(pay,el){
  document.getElementById('qpay').value=pay;
  document.querySelectorAll('#payChoice .opt').forEach(o=>o.className='opt');
  el.className='opt active';
  applyDefaultPay(pay);
}

    .forEach(el=>{if(el)el.style.display=show?'':'none';});
  document.getElementById('t-'+col).className='tgl'+(show?' on':'');

// ── 篩選 ──
function fil(){
  const q=document.getElementById('fq').value.toLowerCase();
  const tp=document.getElementById('ftype').value;
  const ct=document.getElementById('fctry').value;
  const sp=document.getElementById('fsup').value;
  const st=document.getElementById('fst').value;
  filtered=[];
  D.forEach((r,i)=>{
    if(tp&&r[1]!==tp)return;
    if(ct&&r[9]!==ct)return;
    if(sp&&r[12]!==sp)return;
    if(st&&r[16]!==st)return;
    const ch=document.getElementById('fch').value;
    if(ch&&!r[17].includes(ch))return;
    const cat=document.getElementById('fcat')?.value||'';
    if(cat&&r[19]!==cat)return;
    if(q&&!(r[2]+r[3]+r[12]+r[5]).toLowerCase().includes(q))return;
    filtered.push(i);
  });
  document.getElementById('fcnt').textContent=filtered.length+'/'+D.length;
  renTable();
}

function sBadge(s){
  if(s==='PX Mart提案')return'<span class="b bpx">PX</span>';
  if(s==='郵件新增')return'<span class="b bml">郵件</span>';
  return'';
}

function togCart(idx){
  if(cart[idx]!==undefined){delete cart[idx];}
  else{const r=D[idx];const initPrice=isTWD&&r[20]>0?r[20]:(r[15]>0?r[15]:0);cart[idx]={qty:1,price:initPrice,inc:r[11]||'CIF',pay:getDefaultPay(),cur:r[10]||'USD'};}

}

function updP(idx,v){
  if(!cart[idx])return;
  cart[idx].price=parseFloat(v)||0;
  const r=D[idx],mp=r[15]||0,c=cart[idx];const twdFloor=isTWD&&r[20]>0?r[20]:0;const isE=twdFloor>0?(c.price>0&&c.price<twdFloor):(!isTWD&&mp>0&&c.price>0&&c.price<mp);
  const qi=document.getElementById('qi'+idx);
  if(qi){
    qi.className='qi'+(isE?' err':'');
    const inp=qi.querySelectorAll('.qi-row input')[1];
    if(inp)inp.className='iwp'+(isE?' err-inp':'');

  renTotal();
}

        (payInList

          : '<input type="text" style="width:140px;text-align:left" value="'+c.pay+'" onchange="updPay('+idx+',this.value)" oninput="updPay('+idx+',this.value)">')+
      '</div>'+
      (isE?'<div class="qi-err">'+(twdFloor>0?'⚠ 不可低於台幣底限 NT$'+twdFloor.toFixed(0):'⚠ 不可低於底限 '+mp.toFixed(4)+' '+(r[10]||''))+'</div>':'');
    ql.appendChild(div);
  });
  renTotal();
}

function renTotal(){
  const keys=Object.keys(cart).map(Number);
  const hasE=keys.some(idx=>{const r=D[idx],c=cart[idx],mp=r[15]||0;const twdF=isTWD&&r[20]>0?r[20]:0;return twdF>0?(c.price>0&&c.price<twdF):(!isTWD&&mp>0&&c.price>0&&c.price<mp);});
  document.getElementById('pBtn').disabled=!keys.length||hasE;
}

function clrAll(){
  if(!Object.keys(cart).length)return;
  if(confirm('確定清除所有已選產品？')){cart={};renTable();renCart();}
}
